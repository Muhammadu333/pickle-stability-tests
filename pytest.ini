[pytest]
testpaths = .
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings
markers =
    stability: tests that verify hash-identical determinism
    correctness: tests that verify roundtrip fidelity
    boundary: boundary-value analysis tests
    fuzzing: property-based / randomised tests
    whitebox: white-box / structural coverage tests
