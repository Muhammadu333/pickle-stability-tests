version: 2.1

# Free plan: Linux Docker only.
# Windows and macOS require a paid CircleCI plan.
# Cross-OS evidence is provided via PYTHONHASHSEED subprocess tests
# and the GitHub Actions config (.github/workflows/cross_platform.yml).

jobs:
  test-linux-39:
    docker:
      - image: cimg/python:3.9
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: pip install pytest hypothesis
      - run:
          name: Run test suite (Python 3.9)
          command: pytest --tb=short -q
      - run:
          name: Generate reference hashes
          command: python -m pytest test_cross_platform.py -k test_generate_or_compare --generate-refs -q || true
      - store_artifacts:
          path: fixtures/
          destination: fixtures-py39

  test-linux-310:
    docker:
      - image: cimg/python:3.10
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: pip install pytest hypothesis
      - run:
          name: Run test suite (Python 3.10)
          command: pytest --tb=short -q
      - store_artifacts:
          path: fixtures/
          destination: fixtures-py310

  test-linux-311:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: pip install pytest hypothesis
      - run:
          name: Run test suite (Python 3.11)
          command: pytest --tb=short -q
      - store_artifacts:
          path: fixtures/
          destination: fixtures-py311

  test-linux-312:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: pip install pytest hypothesis
      - run:
          name: Run test suite (Python 3.12)
          command: pytest --tb=short -q
      - store_artifacts:
          path: fixtures/
          destination: fixtures-py312

workflows:
  cross-platform:
    jobs:
      - test-linux-39
      - test-linux-310
      - test-linux-311
      - test-linux-312
